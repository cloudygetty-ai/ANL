app = "anl-api"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  sticky_sessions = true

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[services.ports]]
  port = 443
  handlers = ["tls", "http"]

[[services.ports]]
  port = 80
  handlers = ["http"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "5s"
    type = "http"
