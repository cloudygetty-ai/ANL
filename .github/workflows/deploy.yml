name: Deploy to Fly

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'fly.toml'

jobs:
  deploy:
    name: Deploy backend to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --app anl
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
