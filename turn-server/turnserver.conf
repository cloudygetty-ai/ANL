# coturn config — ANL TURN server
listening-port=3478
tls-listening-port=5349

# Replace with your server's public IP
external-ip=$(curl -s https://ipinfo.io/ip)

# Auth
lt-cred-mech
user=anl:${TURN_SECRET}

# Realm
realm=anl.app

# Relay range
min-port=49152
max-port=65535

# Security
fingerprint
no-multicast-peers
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# Logging
log-file=stdout
verbose
